<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windows Live Mail → Outlook PST Exporter (v2)</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --surface: #252525;
      --text: #e0e0e0;
      --muted: #888;
      --accent: #0a7ea4;
      --border: #333;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Segoe UI, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 20px 0;
      text-align: center;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .row label { min-width: 140px; color: var(--muted); font-size: 0.9rem; }
    .row .path {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.85rem;
      color: var(--text);
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .actions { margin: 20px 0; display: flex; justify-content: center; }
    .progress {
      height: 8px;
      background: var(--surface);
      border-radius: 4px;
      overflow: hidden;
      margin: 16px 0;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.2s;
    }
    #status, #summary {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 12px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #summary { margin-top: 16px; }
  </style>
</head>
<body>
  <h1>Windows Live Mail → Outlook PST Exporter (v2)</h1>

  <div class="row">
    <label>Source folder</label>
    <input type="text" id="wlmPath" class="path" readonly placeholder="No folder selected" />
    <button type="button" id="browseWlm">Browse…</button>
  </div>
  <div class="row">
    <label>Target PST file</label>
    <input type="text" id="pstPath" class="path" readonly placeholder="No PST file selected" />
    <button type="button" id="browsePst">Browse…</button>
  </div>

  <div class="actions">
    <button type="button" id="startExport">Start export</button>
  </div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div id="status">Select Windows Live Mail folder and target PST file.</div>
  <div id="summary"></div>

  <script type="module">
    const { invoke } = window.__TAURI__.core;
    const { open, save } = window.__TAURI__.plugin.dialog;

    const wlmPath = document.getElementById('wlmPath');
    const pstPath = document.getElementById('pstPath');
    const browseWlm = document.getElementById('browseWlm');
    const browsePst = document.getElementById('browsePst');
    const startExport = document.getElementById('startExport');
    const progressBar = document.getElementById('progressBar');
    const statusEl = document.getElementById('status');
    const summaryEl = document.getElementById('summary');

    function errStr(e) {
      if (e == null) return 'Unknown error';
      if (typeof e === 'string') return e;
      if (e.message) return e.message;
      if (typeof e.toString === 'function') return e.toString();
      return String(e);
    }

    function pathFromSelected(selected) {
      if (selected == null) return null;
      if (typeof selected === 'string') return selected;
      if (Array.isArray(selected) && selected.length) return selected[0];
      if (selected.path) return selected.path;
      return null;
    }

    browseWlm.addEventListener('click', async () => {
      try {
        const selected = await open({
          directory: true,
          multiple: false,
          title: 'Select Windows Live Mail folder'
        });
        const path = pathFromSelected(selected);
        if (path) wlmPath.value = path;
      } catch (e) {
        statusEl.textContent = 'Failed to open folder dialog: ' + errStr(e);
      }
    });

    browsePst.addEventListener('click', async () => {
      try {
        const selected = await save({
          filters: [{ name: 'Outlook Data File', extensions: ['pst'] }],
          title: 'Select / create target PST file'
        });
        const path = pathFromSelected(selected);
        if (path) pstPath.value = path;
      } catch (e) {
        statusEl.textContent = 'Failed to open save dialog: ' + errStr(e);
      }
    });

    startExport.addEventListener('click', async () => {
      const wlm = wlmPath.value.trim();
      const pst = pstPath.value.trim();
      if (!wlm) {
        statusEl.textContent = 'Please select the Windows Live Mail folder.';
        return;
      }
      if (!pst) {
        statusEl.textContent = 'Please select or enter a target PST file.';
        return;
      }
      startExport.disabled = true;
      progressBar.style.width = '50%';
      statusEl.textContent = 'Starting export… Keep Outlook open.';
      summaryEl.textContent = '';

      try {
        const result = await invoke('run_export_command', { wlmPath: wlm, pstPath: pst });
        statusEl.textContent = 'Done.';
        summaryEl.textContent = result || '';
        progressBar.style.width = '100%';
      } catch (e) {
        statusEl.textContent = 'Error: ' + errStr(e);
        summaryEl.textContent = '';
        progressBar.style.width = '0%';
      } finally {
        startExport.disabled = false;
      }
    });
  </script>
</body>
</html>
